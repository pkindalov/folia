<!-- Floating Micro-interactions & Visual Effects -->
<script>
        // Simple ripple effect for the tactile buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function(e) {
                const x = e.clientX - e.target.offsetLeft;
                const y = e.clientY - e.target.offsetTop;
                const ripple = document.createElement('span');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.classList.add('absolute', 'w-1', 'h-1', 'bg-white/20', 'rounded-full', 'animate-ping');
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Basic scroll effect for TopBar elevation
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
