services:
  api:
    build: ./backend
    container_name: folia-api
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: production
      PORT: 1337
      DB_URL: mongodb://mongo:27017/folia
      # No insecure fallback: compose fails fast if .env is missing JWT_SECRET
      JWT_SECRET: ${JWT_SECRET:?Create a .env file with JWT_SECRET (openssl rand -hex 32)}
      JWT_EXPIRES_IN: 7d
      # Set this to your frontend URL once it exists, e.g. http://localhost:3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOADS_DIR: /app/uploads
    volumes:
      # User uploads persist on your D: drive
      - D:/folia/uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: folia-mongo
    # Database files persist on your D: drive
    volumes:
      - D:/folia/mongo-data:/data/db
    # If MongoDB fails to start with a Windows bind mount
    # (a known Docker Desktop limitation), comment the line above,
    # uncomment the two lines below, and the named volume at the bottom.
    #  - folia-mongo-data:/data/db
    ports:
      # Bound to localhost only — Mongo is not reachable from your network.
      # Remove this mapping entirely if you only access Mongo from the API container.
      - "127.0.0.1:27017:27017"
    restart: unless-stopped

